<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Zero Sum Drop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #0a1018;
      touch-action: none;
    }
    #game-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 0;
      pointer-events: none;
      transform: translateZ(0);
      image-rendering: auto;
      filter: contrast(1.06) saturate(1.05);
    }
    #game-container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
    }
  </style>
</head>
<body>
  <img id="game-bg" src="/assets/cure_forest_bg.webp" alt="" fetchpriority="high" decoding="async" />
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
